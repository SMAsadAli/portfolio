<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asad Shah OG Card</title>
    <style>
      :root {
        --ink: #101315;
        --panel-top: #1b2125;
        --panel-bottom: #14181b;
        --mist: #d9ddd6;
        --paper: #f3efe7;
        --accent: #6d8a86;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: var(--ink);
      }

      body {
        font-family: Helvetica, Arial, sans-serif;
      }

      .frame {
        width: 1200px;
        height: 630px;
        padding: 24px;
        background: var(--ink);
      }

      .card {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 44px;
        border-radius: 40px;
        background: linear-gradient(160deg, var(--panel-top), var(--panel-bottom));
        border: 1px solid rgba(217, 221, 214, 0.14);
        color: var(--paper);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .badge {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
        border-radius: 26px;
        border: 2px solid rgba(217, 221, 214, 0.18);
        background: rgba(17, 19, 21, 0.96);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 42px;
        font-weight: 700;
        letter-spacing: -0.08em;
      }

      .wordmark {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 76px;
        font-weight: 700;
        letter-spacing: -0.06em;
      }

      .eyebrow {
        margin: 54px 0 0;
        color: rgba(217, 221, 214, 0.72);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 3px;
      }

      h1 {
        max-width: 980px;
        margin: 30px 0 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 70px;
        line-height: 1.04;
        letter-spacing: -0.055em;
      }

      p {
        max-width: 760px;
        margin: 16px 0 0;
        color: rgba(217, 221, 214, 0.84);
        font-size: 21px;
        line-height: 1.35;
      }

      .pill {
        position: absolute;
        right: 88px;
        bottom: 66px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 246px;
        height: 56px;
        padding: 0 28px;
        border-radius: 999px;
        background: var(--paper);
        color: var(--ink);
        font-size: 22px;
        font-weight: 800;
      }

      .dot-left,
      .dot-right {
        position: absolute;
        border-radius: 999px;
      }

      .dot-left {
        top: 54px;
        left: 314px;
        width: 12px;
        height: 12px;
        background: var(--paper);
      }

      .dot-right {
        top: 58px;
        right: 78px;
        width: 16px;
        height: 16px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="card">
        <div class="brand">
          <div class="badge">AS</div>
          <div class="wordmark">Asad Shah</div>
        </div>
        <div class="dot-left"></div>
        <div class="dot-right"></div>
        <p class="eyebrow">SENIOR FULL-STACK ENGINEER</p>
        <h1>I build reliable backend systems.</h1>
        <p>Backend, cloud, and long-term delivery for products that need reliable ownership.</p>
        <div class="pill">Asad Shah</div>
      </div>
    </div>
  </body>
</html>
